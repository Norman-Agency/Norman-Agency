<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.2" width="100%" height="100%" viewBox="-450 -250 900 500">
    <style>
        @keyframes rot  { from{transform:rotate(360deg)} to{transform:rotate(0deg)} }
        @keyframes pulse{ 0%{opacity:.4} 50%{opacity:.9} 100%{opacity:.4} }
        @keyframes blink{ 0%,49%{opacity:1} 50%,100%{opacity:0} }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        .orbit1 { animation: rot  7s  linear infinite; transform-origin:0 0; }
        .orbit2 { animation: rot  11s linear infinite; transform-origin:0 0; }
        .orbit3 { animation: rot  16s linear infinite; transform-origin:0 0; }
        .orbit4 { animation: rot  22s linear infinite; transform-origin:0 0; }
        .orbit5 { animation: rot  30s linear infinite; transform-origin:0 0; }
        .pulse  { animation: pulse 3s  ease-in-out infinite; }
        .blink  { animation: blink 1s  step-end infinite; }
        .spin   { animation: spin  20s linear infinite; transform-origin:0 0; }

        .planet { cursor:pointer; }
        .planet:hover .ring  { opacity:1 !important; }
        .planet:hover .label { opacity:1 !important; font-size:10px; }
        .planet:hover .body  { filter:url(#glow2); }
    </style>
    <defs>
          <radialGradient id="bg" cx="50%" cy="50%" r="65%">
                  <stop offset="0%"   stop-color="#1a1a2e"/>
                  <stop offset="100%" stop-color="#070714"/>
          </radialGradient>
          <radialGradient id="gcore" cx="35%" cy="30%" r="80%">
                  <stop offset="0%"   stop-color="#e94560"/>
                  <stop offset="55%"  stop-color="#16213e"/>
                  <stop offset="100%" stop-color="#070714"/>
          </radialGradient>
          <radialGradient id="aura" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stop-color="#e94560" stop-opacity=".25"/>
                  <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
          </radialGradient>

          <!-- Planet gradients -->
          <radialGradient id="p1" cx="35%" cy="30%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#8b0000"/></radialGradient>
          <radialGradient id="p2" cx="35%" cy="30%"><stop offset="0%" stop-color="#ffa94d"/><stop offset="100%" stop-color="#7a3a00"/></radialGradient>
          <radialGradient id="p3" cx="35%" cy="30%"><stop offset="0%" stop-color="#4dd9f5"/><stop offset="100%" stop-color="#003d5b"/></radialGradient>
          <radialGradient id="p4" cx="35%" cy="30%"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#3b0764"/></radialGradient>
          <radialGradient id="p5" cx="35%" cy="30%"><stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#1e293b"/></radialGradient>

          <filter id="glow">
                  <feGaussianBlur stdDeviation="2.5" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow2">
                  <feGaussianBlur stdDeviation="5" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="shadow">
                  <feGaussianBlur stdDeviation="3" result="b"/>
                  <feComposite in="SourceGraphic" in2="b" operator="over"/>
          </filter>
    </defs>

    <!-- BG -->
    <rect x="-450" y="-250" width="900" height="500" fill="url(#bg)"/>

    <!-- Stars -->
    <g fill="white" opacity=".7">
          <circle cx="-410" cy="-210" r="1.1"/><circle cx="370" cy="-225" r=".9"/>
          <circle cx="-290" cy="195"  r="1.3"/><circle cx="405" cy="175"  r=".8"/>
          <circle cx="-175" cy="-235" r="1" /><circle cx="215" cy="228"   r="1.1"/>
          <circle cx="-430" cy="75"   r=".7"/><circle cx="440" cy="-95"   r="1" />
          <circle cx="95"   cy="-242" r="1.1"/><circle cx="-55" cy="242"  r=".9"/>
          <circle cx="285"  cy="-185" r=".7"/><circle cx="-235" cy="148"  r=".9"/>
          <circle cx="430"  cy="48"   r="1.1"/><circle cx="-445" cy="-48" r=".8"/>
          <circle cx="145"  cy="215"  r=".7"/><circle cx="-345" cy="-135" r=".9"/>
          <circle cx="315"  cy="118"  r="1.1"/><circle cx="-115" cy="-215" r=".7"/>
          <circle cx="-385" cy="135"  r=".8"/><circle cx="358"  cy="-80"  r=".9"/>
          <circle cx="-155" cy="225"  r="1" /><circle cx="185"  cy="-205" r=".8"/>
          <circle cx="445"  cy="-160" r=".7"/><circle cx="-265" cy="-185" r="1"/>
    </g>

    <!-- Orbit rings (static dashed) -->
    <ellipse cx="0" cy="0" rx="88"  ry="55"  fill="none" stroke="#ef4444" stroke-width=".6" stroke-dasharray="3,4"  opacity=".3"/>
    <ellipse cx="0" cy="0" rx="140" ry="85"  fill="none" stroke="#f97316" stroke-width=".6" stroke-dasharray="3,4"  opacity=".25"/>
    <ellipse cx="0" cy="0" rx="192" ry="112" fill="none" stroke="#06b6d4" stroke-width=".6" stroke-dasharray="3,4"  opacity=".22"/>
    <ellipse cx="0" cy="0" rx="248" ry="140" fill="none" stroke="#a855f7" stroke-width=".6" stroke-dasharray="3,4"  opacity=".2"/>
    <ellipse cx="0" cy="0" rx="395" ry="198" fill="none" stroke="#94a3b8" stroke-width=".5" stroke-dasharray="4,5"  opacity=".15"/>

    <!-- ===== PLANET 1: VANGUARD ===== -->
    <g class="orbit1">
          <g transform="translate(0,-55)" class="planet">
                  <a xlink:href="https://github.com/Norman-Agency/vanguard" target="_blank">
                            <!-- Atmosphere glow -->
                            <circle r="18" fill="#ef4444" opacity=".12"/>
                            <!-- Ring -->
                            <ellipse rx="24" ry="6" fill="none" stroke="#ef4444" stroke-width="1.2" opacity=".5" class="ring" transform="rotate(-20)"/>
                            <!-- Planet body -->
                            <circle r="13" fill="url(#p1)" class="body" filter="url(#glow)"/>
                            <!-- Shadow -->
                            <circle r="13" fill="#000" opacity=".35" transform="translate(4,4)"/>
                            <circle r="13" fill="url(#p1)"/>
                            <!-- Surface detail -->
                            <circle cx="-3" cy="-3" r="3" fill="#ff9999" opacity=".4"/>
                            <circle cx="4"  cy="2"  r="2" fill="#8b0000" opacity=".5"/>
                            <!-- Label -->
                            <text y="25" text-anchor="middle" font-family="'Courier New',monospace" font-size="9px" fill="#ff6b6b" font-weight="700" class="label" filter="url(#glow)">VANGUARD</text>
                            <text y="35" text-anchor="middle" font-family="'Courier New',monospace" font-size="7px" fill="#ff6b6b" opacity=".8">agent IA pentester</text>
                  </a>
          </g>
    </g>

    <!-- ===== PLANET 2: AGENT-IA-SAMSUNG ===== -->
    <g class="orbit2">
          <g transform="translate(0,85)" class="planet">
                  <a xlink:href="https://github.com/Norman-Agency/agent-ia-samsung" target="_blank">
                            <circle r="20" fill="#f97316" opacity=".1"/>
                            <ellipse rx="26" ry="7" fill="none" stroke="#f97316" stroke-width="1.2" opacity=".5" class="ring" transform="rotate(15)"/>
                            <circle r="15" fill="#000" opacity=".35" transform="translate(4,4)"/>
                            <circle r="15" fill="url(#p2)" class="body" filter="url(#glow)"/>
                            <!-- Surface bands like Saturn -->
                            <path d="M -15,2 Q 0,-4 15,2" fill="none" stroke="#ffd580" stroke-width="1.5" opacity=".4"/>
                            <path d="M -14,5 Q 0,0  14,5" fill="none" stroke="#c87a00" stroke-width="1"   opacity=".3"/>
                            <circle cx="-4" cy="-4" r="4" fill="#ffcc80" opacity=".35"/>
                            <text y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="9px" fill="#ffa94d" font-weight="700" class="label" filter="url(#glow)">AGENT IA</text>
                            <text y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="7px" fill="#ffa94d" opacity=".8">Samsung</text>
                  </a>
          </g>
    </g>

    <!-- ===== PLANET 3: SUBVENTIONAI ===== -->
    <g class="orbit3">
          <g transform="translate(0,-112)" class="planet">
                  <a xlink:href="https://subventionai.fr" target="_blank">
                            <circle r="22" fill="#06b6d4" opacity=".1"/>
                            <ellipse rx="29" ry="7" fill="none" stroke="#06b6d4" stroke-width="1.2" opacity=".5" class="ring" transform="rotate(-10)"/>
                            <circle r="16" fill="#000" opacity=".35" transform="translate(4,4)"/>
                            <circle r="16" fill="url(#p3)" class="body" filter="url(#glow)"/>
                            <!-- Ocean-like swirls -->
                            <circle cx="-3" cy="3"  r="5" fill="#0ea5e9" opacity=".4"/>
                            <circle cx="5"  cy="-4" r="3" fill="#38bdf8" opacity=".35"/>
                            <circle cx="-5" cy="-5" r="4" fill="#0891b2" opacity=".3"/>
                            <text y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="9px" fill="#4dd9f5" font-weight="700" class="label" filter="url(#glow)">SubventionAI</text>
                            <text y="40" text-anchor="middle" font-family="'Courier New',monospace" font-size="7px" fill="#4dd9f5" opacity=".8">subventionai.fr</text>
                  </a>
          </g>
    </g>

    <!-- ===== PLANET 4: JOURNAL-DE-TACHES ===== -->
    <g class="orbit4">
          <g transform="translate(0,140)" class="planet">
                  <a xlink:href="https://github.com/Norman-Agency/journal-de-taches-multi-poste" target="_blank">
                            <circle r="19" fill="#a855f7" opacity=".12"/>
                            <ellipse rx="27" ry="7" fill="none" stroke="#a855f7" stroke-width="1.2" opacity=".5" class="ring" transform="rotate(25)"/>
                            <circle r="14" fill="#000" opacity=".35" transform="translate(4,4)"/>
                            <circle r="14" fill="url(#p4)" class="body" filter="url(#glow)"/>
                            <circle cx="3"  cy="-4" r="5" fill="#d8b4fe" opacity=".3"/>
                            <circle cx="-5" cy="3"  r="3" fill="#7c3aed" opacity=".4"/>
                            <circle cx="4"  cy="5"  r="2" fill="#c084fc" opacity=".35"/>
                            <text y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="9px" fill="#c084fc" font-weight="700" class="label" filter="url(#glow)">JOURNAL</text>
                            <text y="37" text-anchor="middle" font-family="'Courier New',monospace" font-size="7px" fill="#c084fc" opacity=".8">TDAH/TSA + Claude</text>
                  </a>
          </g>
    </g>

    <!-- ===== PLANET 5: NORMAN-AGENCY ===== -->
    <g class="orbit5">
          <g transform="translate(0,-198)" class="planet">
                  <a xlink:href="https://norman-agency.com" target="_blank">
                            <circle r="24" fill="#94a3b8" opacity=".1"/>
                            <ellipse rx="34" ry="9" fill="none" stroke="#94a3b8" stroke-width="1.2" opacity=".45" class="ring" transform="rotate(-15)"/>
                            <circle r="18" fill="#000" opacity=".35" transform="translate(4,4)"/>
                            <circle r="18" fill="url(#p5)" class="body" filter="url(#glow)"/>
                            <circle cx="-5" cy="-5" r="6" fill="#e2e8f0" opacity=".25"/>
                            <circle cx="5"  cy="4"  r="4" fill="#64748b" opacity=".4"/>
                            <circle cx="-3" cy="6"  r="3" fill="#cbd5e1" opacity=".3"/>
                            <text y="32" text-anchor="middle" font-family="'Courier New',monospace" font-size="9px" fill="#cbd5e1" font-weight="700" class="label" filter="url(#glow)">Norman-Agency</text>
                            <text y="42" text-anchor="middle" font-family="'Courier New',monospace" font-size="7px" fill="#cbd5e1" opacity=".8">norman-agency.com</text>
                  </a>
          </g>
    </g>

    <!-- ===== CENTER STAR (NORMAN AGENCY) ===== -->
    <g>
          <!-- Outer aura -->
          <ellipse cx="0" cy="0" rx="80" ry="80" fill="url(#aura)" class="pulse"/>
          <!-- Spinning halo -->
          <g class="spin">
                  <ellipse cx="0" cy="0" rx="58" ry="58" fill="none" stroke="#e94560" stroke-width=".8" stroke-dasharray="6,3" opacity=".4"/>
          </g>
          <!-- Core -->
          <circle r="46" fill="url(#gcore)" stroke="#e94560" stroke-width="1.8" filter="url(#glow)"/>
          <!-- Logo text -->
          <text y="-8"  text-anchor="middle" font-family="'Courier New',monospace" font-size="11px" fill="#e94560" font-weight="700" filter="url(#glow2)" letter-spacing="1">NORMAN</text>
          <text y="7"   text-anchor="middle" font-family="'Courier New',monospace" font-size="11px" fill="white"   font-weight="700" letter-spacing="1">AGENCY</text>
          <text y="21"  text-anchor="middle" font-family="'Courier New',monospace" font-size="5.5px" fill="#888">creative digital</text>
    </g>

    <!-- ===== LABELS TOP ===== -->
    <text x="-440" y="-225" font-family="'Courier New',monospace" font-size="15px" fill="#fbbf24" font-weight="700" filter="url(#glow)">&#x1F94A; muay thai</text>
    <text x="-440" y="-210" font-family="'Courier New',monospace" font-size="8px"  fill="#fbbf24" opacity=".7">norman nonnon</text>

    <text x="440"  y="-225" text-anchor="end" font-family="'Courier New',monospace" font-size="15px" fill="#a855f7" font-weight="700" filter="url(#glow)">intelligence artificielle &#x1F916;</text>
    <text x="440"  y="-210" text-anchor="end" font-family="'Courier New',monospace" font-size="8px"  fill="#a855f7" opacity=".7">LLM · Claude · agents IA</text>

    <!-- Title -->
    <text x="0" y="-234" text-anchor="middle" font-family="'Courier New',monospace" font-size="12px" fill="#e94560" opacity=".65" letter-spacing="2">explo(r|it)ing digital boundaries</text>
    <text x="294" y="-234" font-family="'Courier New',monospace" font-size="12px" fill="#e94560" class="blink">_</text>

    <!-- Bottom -->
    <text x="0" y="242" text-anchor="middle" font-family="'Courier New',monospace" font-size="8px" fill="#444">norman-agency.com  ·  subventionai.fr  ·  Clean code, beautiful UI</text>

    <!-- Clock -->
    <g transform="translate(418,198)" stroke="#64748b" opacity=".55">
          <circle r="18" fill="none" stroke-width="1"/>
          <circle r="1.5" fill="#64748b"/>
          <path d="M0,0 V-14" stroke="#94a3b8" stroke-width="1" style="animation:rot 1s linear infinite;transform-origin:0 0"/>
          <path d="M0,0 V-9"  stroke="#94a3b8" stroke-width="2" style="animation:rot 12s linear infinite;transform-origin:0 0"/>
    </g>

</svg>

—————····<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.2" width="100%" height="100%" viewBox="-432 -432 864 864" translate="no">
    <style type="text/css">
        @keyframes rot {
          from { transform: rotate(360deg) translateZ(0); }
          to   { transform: rotate(0deg)   translateZ(0); }
        }
        @keyframes pulse { 0%{opacity:.3} 50%{opacity:.8} 100%{opacity:.3} }
        @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

        .rot_v { animation: rot  7s  linear infinite; will-change:transform; transform:translateZ(0); }
        .rot_s { animation: rot  11s linear infinite; will-change:transform; transform:translateZ(0); }
        .rot_a { animation: rot  15s linear infinite; will-change:transform; transform:translateZ(0); }
        .rot_j { animation: rot  20s linear infinite; will-change:transform; transform:translateZ(0); }
        .rot_n { animation: rot  28s linear infinite; will-change:transform; transform:translateZ(0); }
        .rot_hr{ animation: rot  12s linear infinite; will-change:transform; transform:translateZ(0); }
        .rot_mn{ animation: rot   1s linear infinite; will-change:transform; transform:translateZ(0); }
        .pulse { animation: pulse 3s ease-in-out infinite; }
        .blink { animation: blink 1s step-end infinite; }

        .ring { fill:none; stroke-width:1; stroke-dasharray:3,3; opacity:.35; }
        .nofade { pointer-events:none; }
        a { outline:none; }
    </style>
    <defs>
          <radialGradient id="bg" cx="50%" cy="50%" r="60%">
                  <stop offset="0%"   stop-color="#1a1a2e"/>
                  <stop offset="100%" stop-color="#070714"/>
          </radialGradient>
          <radialGradient id="gcore" cx="35%" cy="30%" r="75%">
                  <stop offset="0%"   stop-color="#e94560"/>
                  <stop offset="50%"  stop-color="#16213e"/>
                  <stop offset="100%" stop-color="#070714"/>
          </radialGradient>
          <radialGradient id="aura" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stop-color="#e94560" stop-opacity=".3"/>
                  <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="p_red" cx="35%" cy="30%">
                  <stop offset="0%"   stop-color="#ff6b6b"/>
                  <stop offset="100%" stop-color="#7f0000"/>
          </radialGradient>
          <radialGradient id="p_ora" cx="35%" cy="30%">
                  <stop offset="0%"   stop-color="#ffb347"/>
                  <stop offset="100%" stop-color="#7a3a00"/>
          </radialGradient>
          <radialGradient id="p_cya" cx="35%" cy="30%">
                  <stop offset="0%"   stop-color="#4dd9f5"/>
                  <stop offset="100%" stop-color="#003d5b"/>
          </radialGradient>
          <radialGradient id="p_pur" cx="35%" cy="30%">
                  <stop offset="0%"   stop-color="#c084fc"/>
                  <stop offset="100%" stop-color="#3b0764"/>
          </radialGradient>
          <radialGradient id="p_gry" cx="35%" cy="30%">
                  <stop offset="0%"   stop-color="#94a3b8"/>
                  <stop offset="100%" stop-color="#1e293b"/>
          </radialGradient>
          <filter id="glow">
                  <feGaussianBlur stdDeviation="2.5" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow2">
                  <feGaussianBlur stdDeviation="4" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Planete generique : cercle 3D avec anneau et label -->
          <!-- Chaque planete est un <g> positionne a translate(0,-rayon) -->
          <!-- Le groupe parent tourne avec class rot_X -->

          <!-- VANGUARD planet def -->
          <g id="planet_v">
                  <a xlink:href="https://github.com/Norman-Agency/vanguard" target="_blank">
                            <circle r="16" fill="#ef4444" opacity=".15"/>
                            <circle r="11" fill="url(#p_red)" filter="url(#glow)"/>
                            <circle r="11" fill="url(#p_red)"/>
                            <circle cx="-3" cy="-3" r="3" fill="#ff9999" opacity=".4"/>
                            <circle cx="4"  cy="2"  r="2" fill="#7f0000" opacity=".5"/>
                            <ellipse rx="16" ry="4" fill="none" stroke="#ef4444" stroke-width="1" opacity=".6" transform="rotate(-20)"/>
                            <text y="22"  text-anchor="middle" font-family="'Courier New',monospace" font-size="10px" font-weight="700" fill="#ff6b6b" filter="url(#glow)">VANGUARD</text>
                            <text y="33"  text-anchor="middle" font-family="'Courier New',monospace" font-size="8px"  fill="#ff6b6b" opacity=".75">agent IA pentester</text>
                  </a>
          </g>

          <!-- SAMSUNG planet def -->
          <g id="planet_s">
                  <a xlink:href="https://github.com/Norman-Agency/agent-ia-samsung" target="_blank">
                            <circle r="18" fill="#f97316" opacity=".12"/>
                            <circle r="13" fill="url(#p_ora)" filter="url(#glow)"/>
                            <circle r="13" fill="url(#p_ora)"/>
                            <path d="M-13,2 Q0,-5 13,2"  fill="none" stroke="#ffd580" stroke-width="1.5" opacity=".4"/>
                            <path d="M-12,5 Q0,0  12,5"  fill="none" stroke="#c87a00" stroke-width="1"   opacity=".3"/>
                            <circle cx="-4" cy="-4" r="4" fill="#ffcc80" opacity=".3"/>
                            <ellipse rx="18" ry="5" fill="none" stroke="#f97316" stroke-width="1" opacity=".6" transform="rotate(15)"/>
                            <text y="24"  text-anchor="middle" font-family="'Courier New',monospace" font-size="10px" font-weight="700" fill="#ffb347" filter="url(#glow)">AGENT IA</text>
                            <text y="35"  text-anchor="middle" font-family="'Courier New',monospace" font-size="8px"  fill="#ffb347" opacity=".75">Samsung</text>
                  </a>
          </g>

          <!-- SUBVENTIONAI planet def -->
          <g id="planet_a">
                  <a xlink:href="https://subventionai.fr" target="_blank">
                            <circle r="19" fill="#06b6d4" opacity=".12"/>
                            <circle r="14" fill="url(#p_cya)" filter="url(#glow)"/>
                            <circle r="14" fill="url(#p_cya)"/>
                            <circle cx="-3" cy="3"  r="5" fill="#0ea5e9" opacity=".35"/>
                            <circle cx="5"  cy="-4" r="3" fill="#38bdf8" opacity=".3"/>
                            <circle cx="-5" cy="-5" r="3" fill="#0891b2" opacity=".3"/>
                            <ellipse rx="20" ry="5" fill="none" stroke="#06b6d4" stroke-width="1" opacity=".6" transform="rotate(-10)"/>
                            <text y="26"  text-anchor="middle" font-family="'Courier New',monospace" font-size="10px" font-weight="700" fill="#4dd9f5" filter="url(#glow)">SubventionAI</text>
                            <text y="37"  text-anchor="middle" font-family="'Courier New',monospace" font-size="8px"  fill="#4dd9f5" opacity=".75">subventionai.fr</text>
                  </a>
          </g>

          <!-- JOURNAL planet def -->
          <g id="planet_j">
                  <a xlink:href="https://github.com/Norman-Agency/journal-de-taches-multi-poste" target="_blank">
                            <circle r="17" fill="#a855f7" opacity=".12"/>
                            <circle r="12" fill="url(#p_pur)" filter="url(#glow)"/>
                            <circle r="12" fill="url(#p_pur)"/>
                            <circle cx="3"  cy="-4" r="4" fill="#d8b4fe" opacity=".3"/>
                            <circle cx="-5" cy="3"  r="3" fill="#7c3aed" opacity=".4"/>
                            <ellipse rx="17" ry="4" fill="none" stroke="#a855f7" stroke-width="1" opacity=".6" transform="rotate(25)"/>
                            <text y="23"  text-anchor="middle" font-family="'Courier New',monospace" font-size="10px" font-weight="700" fill="#c084fc" filter="url(#glow)">JOURNAL</text>
                            <text y="34"  text-anchor="middle" font-family="'Courier New',monospace" font-size="8px"  fill="#c084fc" opacity=".75">TDAH/TSA + Claude</text>
                  </a>
          </g>

          <!-- NORMAN-AGENCY planet def -->
          <g id="planet_n">
                  <a xlink:href="https://norman-agency.com" target="_blank">
                            <circle r="22" fill="#94a3b8" opacity=".1"/>
                            <circle r="16" fill="url(#p_gry)" filter="url(#glow)"/>
                            <circle r="16" fill="url(#p_gry)"/>
                            <circle cx="-5" cy="-5" r="5" fill="#e2e8f0" opacity=".2"/>
                            <circle cx="5"  cy="4"  r="3" fill="#64748b" opacity=".4"/>
                            <ellipse rx="23" ry="6" fill="none" stroke="#94a3b8" stroke-width="1" opacity=".5" transform="rotate(-15)"/>
                            <text y="30"  text-anchor="middle" font-family="'Courier New',monospace" font-size="10px" font-weight="700" fill="#cbd5e1" filter="url(#glow)">Norman-Agency</text>
                            <text y="41"  text-anchor="middle" font-family="'Courier New',monospace" font-size="8px"  fill="#cbd5e1" opacity=".75">norman-agency.com</text>
                  </a>
          </g>

    </defs>

    <!-- ========== FOND ========== -->
    <rect x="-432" y="-432" width="864" height="864" fill="url(#bg)"/>

    <!-- ========== ETOILES ========== -->
    <g fill="white" class="nofade">
          <circle cx="-400" cy="-390" r="1.1" opacity=".6"/>
          <circle cx="360"  cy="-410" r=".9"  opacity=".5"/>
          <circle cx="-280" cy="380"  r="1.3" opacity=".7"/>
          <circle cx="395"  cy="360"  r=".8"  opacity=".4"/>
          <circle cx="-160" cy="-420" r="1"   opacity=".8"/>
          <circle cx="210"  cy="415"  r="1.1" opacity=".5"/>
          <circle cx="-420" cy="130"  r=".7"  opacity=".6"/>
          <circle cx="425"  cy="-180" r="1"   opacity=".7"/>
          <circle cx="90"   cy="-428" r="1.1" opacity=".5"/>
          <circle cx="-50"  cy="428"  r=".9"  opacity=".4"/>
          <circle cx="275"  cy="-360" r=".7"  opacity=".6"/>
          <circle cx="-225" cy="330"  r=".9"  opacity=".5"/>
          <circle cx="415"  cy="90"   r="1.1" opacity=".3"/>
          <circle cx="-430" cy="-80"  r=".8"  opacity=".5"/>
          <circle cx="140"  cy="405"  r=".7"  opacity=".7"/>
          <circle cx="-335" cy="-260" r=".9"  opacity=".4"/>
          <circle cx="305"  cy="240"  r="1.1" opacity=".3"/>
          <circle cx="-110" cy="-395" r=".7"  opacity=".6"/>
          <circle cx="-375" cy="245"  r=".8"  opacity=".5"/>
          <circle cx="350"  cy="-140" r=".9"  opacity=".4"/>
          <circle cx="-150" cy="395"  r="1"   opacity=".5"/>
          <circle cx="180"  cy="-385" r=".8"  opacity=".6"/>
          <circle cx="430"  cy="-300" r=".7"  opacity=".4"/>
          <circle cx="-260" cy="-345" r="1"   opacity=".5"/>
    </g>

    <!-- ========== ORBITES (cercles en pointilles) ========== -->
    <circle cx="0" cy="0" r="110" class="ring" stroke="#ef4444"/>
    <circle cx="0" cy="0" r="175" class="ring" stroke="#f97316"/>
    <circle cx="0" cy="0" r="245" class="ring" stroke="#06b6d4"/>
    <circle cx="0" cy="0" r="310" class="ring" stroke="#a855f7"/>
    <circle cx="0" cy="0" r="390" class="ring" stroke="#94a3b8"/>

    <!-- ========== PLANETES EN ORBITE ========== -->
    <!-- VANGUARD - orbite 110px -->
    <g class="rot_v">
          <use xlink:href="#planet_v" transform="translate(0,-110)"/>
    </g>

    <!-- SAMSUNG - orbite 175px, decalage 120deg -->
    <g class="rot_s" style="transform:rotate(120deg) translateZ(0)">
          <use xlink:href="#planet_s" transform="translate(0,-175)"/>
    </g>

    <!-- SUBVENTIONAI - orbite 245px, decalage 240deg -->
    <g class="rot_a" style="transform:rotate(240deg) translateZ(0)">
          <use xlink:href="#planet_a" transform="translate(0,-245)"/>
    </g>

    <!-- JOURNAL - orbite 310px, decalage 60deg -->
    <g class="rot_j" style="transform:rotate(60deg) translateZ(0)">
          <use xlink:href="#planet_j" transform="translate(0,-310)"/>
    </g>

    <!-- NORMAN-AGENCY - orbite 390px, decalage 180deg -->
    <g class="rot_n" style="transform:rotate(180deg) translateZ(0)">
          <use xlink:href="#planet_n" transform="translate(0,-390)"/>
    </g>

    <!-- ========== ETOILE CENTRALE ========== -->
    <g class="nofade">
          <circle cx="0" cy="0" r="85"  fill="url(#aura)" class="pulse"/>
          <circle cx="0" cy="0" r="55"  fill="url(#gcore)" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
          <text x="0" y="-10" text-anchor="middle" font-family="'Courier New',monospace" font-size="13px" font-weight="700" fill="#e94560" filter="url(#glow2)" letter-spacing="1">NORMAN</text>
          <text x="0" y="7"   text-anchor="middle" font-family="'Courier New',monospace" font-size="13px" font-weight="700" fill="white"   letter-spacing="1">AGENCY</text>
          <text x="0" y="22"  text-anchor="middle" font-family="'Courier New',monospace" font-size="7px"  fill="#888">creative digital</text>
    </g>

    <!-- ========== LABELS ========== -->
    <text x="-425" y="-400" font-family="'Courier New',monospace" font-size="18px" font-weight="700" fill="#fbbf24" filter="url(#glow)" class="nofade">&#x1F94A; muay thai</text>
    <text x="-425" y="-378" font-family="'Courier New',monospace" font-size="10px" fill="#fbbf24" opacity=".7" class="nofade">norman nonnon</text>

    <text x="425"  y="-400" text-anchor="end" font-family="'Courier New',monospace" font-size="18px" font-weight="700" fill="#a855f7" filter="url(#glow)" class="nofade">intelligence artificielle &#x1F916;</text>
    <text x="425"  y="-378" text-anchor="end" font-family="'Courier New',monospace" font-size="10px" fill="#a855f7" opacity=".7" class="nofade">LLM · Claude · agents IA</text>

    <text x="0" y="-420" text-anchor="middle" font-family="'Courier New',monospace" font-size="13px" fill="#e94560" opacity=".6" letter-spacing="2" class="nofade">explo(r|it)ing digital boundaries</text>
    <text x="305" y="-420" font-family="'Courier New',monospace" font-size="13px" fill="#e94560" class="blink nofade">_</text>

    <text x="0" y="425" text-anchor="middle" font-family="'Courier New',monospace" font-size="9px" fill="#444" class="nofade">norman-agency.com  ·  subventionai.fr  ·  Clean code, beautiful UI</text>

    <!-- ========== HORLOGE ========== -->
    <g transform="translate(385,385)" stroke="#64748b" opacity=".5" class="nofade">
          <circle cx="0" cy="0" r="22" fill="none" stroke-width="1.2"/>
          <circle cx="0" cy="0" r="2"  fill="#64748b"/>
          <line x1="0" y1="0" x2="0" y2="-17" stroke="#94a3b8" stroke-width="1.2" class="rot_mn"/>
          <line x1="0" y1="0" x2="0" y2="-11" stroke="#94a3b8" stroke-width="2"   class="rot_hr"/>
    </g>

</svg>

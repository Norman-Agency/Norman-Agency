<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.2" width="100%" height="100%" viewBox="-450 -250 900 500" translate="no">
    <style type="text/css">
        .main { font-family:'Courier New', monospace; cursor:default; }
        .main:hover   { opacity:0.4; }
        .active:hover { opacity:1; }
        .nofade       { pointer-events:none; }
        @keyframes rot { from { transform:rotate(360deg); } to { transform:rotate(0deg); } }
        @keyframes pulse { 0%{opacity:0.5} 50%{opacity:1} 100%{opacity:0.5} }
        @keyframes blink { 0%{opacity:1} 49%{opacity:1} 50%{opacity:0} 100%{opacity:0} }
        .rot_vanguard   { animation: rot 6s   linear infinite; }
        .rot_samsung    { animation: rot 9s   linear infinite; }
        .rot_subvention { animation: rot 13s  linear infinite; }
        .rot_journal    { animation: rot 18s  linear infinite; }
        .rot_agency     { animation: rot 24s  linear infinite; }
        .rot_min        { animation: rot 1s   linear infinite; }
        .rot_hr         { animation: rot 12s  linear infinite; }
        .pulse          { animation: pulse 2.5s ease-in-out infinite; }
        .blink          { animation: blink 1s step-end infinite; }
    </style>
    <defs>
          <radialGradient id="bg" cx="50%" cy="50%" r="60%">
                  <stop offset="0%"   stop-color="#1a1a2e"/>
                  <stop offset="100%" stop-color="#0a0a15"/>
          </radialGradient>
          <radialGradient id="core_grad" cx="35%" cy="30%" r="80%">
                  <stop offset="0%"   stop-color="#e94560"/>
                  <stop offset="50%"  stop-color="#16213e"/>
                  <stop offset="100%" stop-color="#0a0a15"/>
          </radialGradient>
          <radialGradient id="aura" cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stop-color="#e94560" stop-opacity="0.2"/>
                  <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
          </radialGradient>
          <filter id="glow">
                  <feGaussianBlur stdDeviation="2" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow2">
                  <feGaussianBlur stdDeviation="3.5" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <g id="sat">
                  <circle cx="0" cy="0" r="5" fill="white" filter="url(#glow)"/>
                  <circle cx="0" cy="0" r="3" fill="currentColor"/>
          </g>
    </defs>

    <!-- Background -->
    <rect x="-450" y="-250" width="900" height="500" fill="url(#bg)"/>

    <!-- Stars -->
    <g fill="white" class="nofade">
          <circle cx="-400" cy="-200" r="1.2" opacity="0.6"/>
          <circle cx="350"  cy="-220" r="1"   opacity="0.5"/>
          <circle cx="-300" cy="190"  r="1.4" opacity="0.7"/>
          <circle cx="390"  cy="170"  r="1"   opacity="0.4"/>
          <circle cx="-180" cy="-230" r="1"   opacity="0.8"/>
          <circle cx="200"  cy="230"  r="1.2" opacity="0.5"/>
          <circle cx="-420" cy="80"   r="0.8" opacity="0.6"/>
          <circle cx="430"  cy="-100" r="1"   opacity="0.7"/>
          <circle cx="100"  cy="-240" r="1.2" opacity="0.5"/>
          <circle cx="-60"  cy="240"  r="1"   opacity="0.4"/>
          <circle cx="280"  cy="-180" r="0.8" opacity="0.6"/>
          <circle cx="-230" cy="150"  r="1"   opacity="0.5"/>
          <circle cx="420"  cy="50"   r="1.2" opacity="0.3"/>
          <circle cx="-440" cy="-50"  r="1"   opacity="0.5"/>
          <circle cx="140"  cy="210"  r="0.8" opacity="0.7"/>
          <circle cx="-340" cy="-130" r="1"   opacity="0.4"/>
          <circle cx="310"  cy="120"  r="1.2" opacity="0.3"/>
          <circle cx="-120" cy="-210" r="0.8" opacity="0.6"/>
    </g>

    <g class="main">
          <circle cx="0" cy="0" r="99999" fill-opacity="0"/>

          <!-- === ORBIT 1: VANGUARD (closest, fastest) === -->
          <g id="o_vanguard" class="active" stroke="#ef4444" fill="#ef4444" opacity="0.95">
                  <ellipse cx="0" cy="0" rx="88" ry="55" fill="none" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
                  <g class="rot_vanguard">
                            <use xlink:href="#sat" transform="translate(0,-55)" color="#ef4444"/>
                  </g>
                  <a target="_blank" xlink:href="https://github.com/Norman-Agency/vanguard">
                            <text x="-92" y="-46" fill="#ef4444" font-size="11px" font-weight="700" text-anchor="end" filter="url(#glow)">vanguard</text>
                            <text x="-92" y="-34" fill="#ef4444" font-size="8px" text-anchor="end">agent IA pentester</text>
                  </a>
          </g>

          <!-- === ORBIT 2: AGENT-IA-SAMSUNG === -->
          <g id="o_samsung" class="active" stroke="#f97316" fill="#f97316" opacity="0.95">
                  <ellipse cx="0" cy="0" rx="138" ry="82" fill="none" stroke-width="1" stroke-dasharray="3,3" opacity="0.55"/>
                  <g class="rot_samsung">
                            <use xlink:href="#sat" transform="translate(0,82)" color="#f97316"/>
                  </g>
                  <a target="_blank" xlink:href="https://github.com/Norman-Agency/agent-ia-samsung">
                            <text x="145" y="60" fill="#f97316" font-size="11px" font-weight="700" text-anchor="start" filter="url(#glow)">agent-ia-samsung</text>
                            <text x="145" y="72" fill="#f97316" font-size="8px" text-anchor="start">Samsung → IA perso</text>
                  </a>
          </g>

          <!-- === ORBIT 3: SUBVENTIONAI === -->
          <g id="o_subvention" class="active" stroke="#06b6d4" fill="#06b6d4" opacity="0.95">
                  <ellipse cx="0" cy="0" rx="188" ry="110" fill="none" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
                  <g class="rot_subvention">
                            <use xlink:href="#sat" transform="translate(0,-110)" color="#06b6d4"/>
                  </g>
                  <a target="_blank" xlink:href="https://github.com/Norman-Agency/SubventionAI">
                            <text x="195" y="-95" fill="#06b6d4" font-size="11px" font-weight="700" text-anchor="start" filter="url(#glow)">SubventionAI</text>
                            <text x="195" y="-83" fill="#06b6d4" font-size="8px" text-anchor="start">subventions FR + IA</text>
                  </a>
          </g>

          <!-- === ORBIT 4: JOURNAL-DE-TACHES === -->
          <g id="o_journal" class="active" stroke="#a855f7" fill="#a855f7" opacity="0.95">
                  <ellipse cx="0" cy="0" rx="238" ry="138" fill="none" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"/>
                  <g class="rot_journal">
                            <use xlink:href="#sat" transform="translate(0,-138)" color="#a855f7"/>
                  </g>
                  <a target="_blank" xlink:href="https://github.com/Norman-Agency/journal-de-taches-multi-poste">
                            <text x="-245" y="-125" fill="#a855f7" font-size="11px" font-weight="700" filter="url(#glow)">journal-de-taches</text>
                            <text x="-245" y="-113" fill="#a855f7" font-size="8px">TDAH/TSA + Claude AI</text>
                  </a>
          </g>

          <!-- === ORBIT 5: NORMAN-AGENCY (slowest, outermost) === -->
          <g id="o_agency" class="active" stroke="#94a3b8" fill="#94a3b8" opacity="0.9">
                  <ellipse cx="0" cy="0" rx="390" ry="195" fill="none" stroke-width="1" stroke-dasharray="4,4" opacity="0.35"/>
                  <g class="rot_agency">
                            <use xlink:href="#sat" transform="translate(0,-195)" color="#94a3b8"/>
                  </g>
                  <a target="_blank" xlink:href="https://github.com/Norman-Agency">
                            <text x="395" y="-130" fill="#94a3b8" font-size="12px" font-weight="700" text-anchor="start" filter="url(#glow)">Norman-Agency</text>
                            <text x="395" y="-118" fill="#94a3b8" font-size="8px" text-anchor="start">creative digital agency</text>
                  </a>
          </g>

          <!-- === CENTER CORE === -->
          <g id="core" class="nofade">
                  <ellipse cx="0" cy="0" rx="75" ry="75" fill="url(#aura)" class="pulse"/>
                  <circle  cx="0" cy="0" r="45" fill="url(#core_grad)" stroke="#e94560" stroke-width="2"/>
                  <text x="0" y="-8"  text-anchor="middle" font-size="11px" fill="#e94560" font-weight="700" font-family="'Courier New',monospace" filter="url(#glow2)">NORMAN</text>
                  <text x="0" y="6"   text-anchor="middle" font-size="11px" fill="white"   font-weight="700" font-family="'Courier New',monospace">AGENCY</text>
                  <text x="0" y="20"  text-anchor="middle" font-size="6px"  fill="#888"    font-family="'Courier New',monospace">creative digital</text>
          </g>

          <!-- === TOP TITLE === -->
          <g class="nofade">
                  <text x="0" y="-228" text-anchor="middle" font-size="13px" fill="#e94560" opacity="0.7" font-family="'Courier New',monospace" letter-spacing="2">explo(r|it)ing digital boundaries</text>
          </g>

          <!-- === MUAY THAI label top-left === -->
          <g class="nofade">
                  <text x="-440" y="-215" fill="#fbbf24" font-size="16px" font-weight="700" font-family="'Courier New',monospace" filter="url(#glow)">&#x1F94A; muay thai</text>
                  <text x="-440" y="-200" fill="#fbbf24" font-size="9px"  font-family="'Courier New',monospace">norman nonnon</text>
          </g>

          <!-- === IA label top-right === -->
          <g class="nofade">
                  <text x="440" y="-215" fill="#a855f7" font-size="16px" font-weight="700" text-anchor="end" font-family="'Courier New',monospace" filter="url(#glow)">intelligence artificielle &#x1F916;</text>
                  <text x="440" y="-200" fill="#a855f7" font-size="9px"  text-anchor="end" font-family="'Courier New',monospace">LLM · Claude · agents</text>
          </g>

          <!-- === BOTTOM TEXT === -->
          <g class="nofade">
                  <text x="0" y="240" text-anchor="middle" font-size="9px" fill="#555" font-family="'Courier New',monospace">norman-agency.com  ·  subventionai.fr  ·  Clean code, beautiful UI</text>
          </g>

          <!-- === CLOCK (decorative, bottom-right) === -->
          <g class="nofade" transform="translate(415,195)" stroke="#94a3b8" opacity="0.6">
                  <circle cx="0" cy="0" r="20" fill="none" stroke-width="1.2"/>
                  <circle cx="0" cy="0" r="2"  fill="#94a3b8"/>
                  <path class="rot_min" d="M 0,0 V -16" stroke="#cbd5e1" stroke-width="1.2"/>
                  <path class="rot_hr"  d="M 0,0 V -10" stroke="#cbd5e1" stroke-width="2"/>
          </g>

          <!-- === CURSOR BLINK (top-right of title) === -->
          <g class="nofade">
                  <text x="310" y="-228" fill="#e94560" font-size="13px" font-family="'Courier New',monospace" class="blink">_</text>
          </g>

    </g>
</svg>
